.main{margin-left:300px;padding:24px}

</div>

</div>

<div class="card"><canvas id="chartCities"></canvas></div>

const modelSel=document.getElementById('model');
const yearSel=document.getElementById('year');
const citySel=document.getElementById('city');
const paySel=document.getElementById('pay');

function fill(sel,label,vals){
sel.innerHTML='<option value="">'+label+'</option>';
[...new Set(vals)].sort().forEach(v=>sel.innerHTML+=`<option>${v}</option>`);
}

fill(modelSel,'Todos os Modelos',raw.map(x=>x.PorscheModelSanitized));
fill(yearSel,'Todos os Anos',raw.map(x=>x.ModelYearSanitized));
fill(citySel,'Todas as Cidades',raw.map(x=>x.CitySanitized));
fill(paySel,'Todos Pagamentos',raw.map(x=>x.PayMethodSanitized));

let mChart,cChart;

function getFiltered(){
return raw.filter(r=>
(!modelSel.value || r.PorscheModelSanitized==modelSel.value) &&
(!yearSel.value || String(r.ModelYearSanitized)==yearSel.value) &&
(!citySel.value || r.CitySanitized==citySel.value) &&
(!paySel.value || r.PayMethodSanitized==paySel.value)
);
}

function countBy(data,key){
const o={};
data.forEach(r=>o[r[key]]=(o[r[key]]||0)+1);
return o;
}

function render(){
const d=getFiltered();

document.getElementById('sales').innerText=d.length;
const rev=d.reduce((a,b)=>a+(Number(b.SalesPriceSanitized)||0),0);
document.getElementById('revenue').innerText='$'+rev.toLocaleString();

const models=countBy(d,'PorscheModelSanitized');
const cities=countBy(d,'CitySanitized');

const topModel=Object.entries(models).sort((a,b)=>b[1]-a[1])[0];
const topCity=Object.entries(cities).sort((a,b)=>b[1]-a[1])[0];

document.getElementById('leaderModel').innerText=topModel?topModel[0]:'-';
document.getElementById('leaderCity').innerText=topCity?topCity[0]:'-';

if(mChart)mChart.destroy();
if(cChart)cChart.destroy();

mChart=new Chart(document.getElementById('chartModels'),{
type:'bar',
data:{labels:Object.keys(models),datasets:[{data:Object.values(models)}]}
});

cChart=new Chart(document.getElementById('chartCities'),{
type:'bar',
data:{labels:Object.keys(cities),datasets:[{data:Object.values(cities)}]}
});

const tbody=document.getElementById('tbody');
tbody.innerHTML='';
const cityModel={};
d.forEach(r=>{
cityModel[r.CitySanitized] ??= {};
cityModel[r.CitySanitized][r.PorscheModelSanitized]=(cityModel[r.CitySanitized][r.PorscheModelSanitized]||0)+1;
});

Object.entries(cityModel).forEach(([city,mods])=>{
const lead=Object.entries(mods).sort((a,b)=>b[1]-a[1])[0];
tbody.innerHTML+=`<tr><td>${city}</td><td>${lead[0]}</td><td>${lead[1]}</td></tr>`;
});
}

function resetFilters(){modelSel.value='';yearSel.value='';citySel.value='';paySel.value='';render();}

[modelSel,yearSel,citySel,paySel].forEach(x=>x.addEventListener('change',render));
render();
</script>
